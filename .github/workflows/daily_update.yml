name: Daily English Conversation Generator

on:
  schedule:
    # 매일 UTC 22:00 실행 (한국 시간 아침 7시)
    - cron: '0 22 * * *'
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 실행할 수 있는 버튼 활성화

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 레포지토리 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 파이썬 스크립트 실행 (HTML 생성 및 인덱스 업데이트)
      env:
        UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
      run: python generate_daily.py

    - name: 변경사항 커밋 및 푸시
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update: Add daily conversation html"
        push_options: '--force-with-lease'
